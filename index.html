    body { margin: 0; background-color: #000; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow: hidden; }
    
    /* CRT & Scanline Effects */
    .crt::before {
      content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }
    @keyframes scan {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }
    .animate-scan { animation: scan 4s linear infinite; }
    
    /* Glitch Effect */
    @keyframes glitch-anim {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 2px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -2px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 2px); }
      100% { clip-path: inset(30% 0 50% 0); transform: translate(2px, -2px); }
    }
    .glitch { position: relative; }
    .glitch::before, .glitch::after {
      content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black;
    }
    .glitch::before { left: 2px; text-shadow: -1px 0 red; animation: glitch-anim 2s infinite linear alternate-reverse; }
    .glitch::after { left: -2px; text-shadow: -1px 0 blue; animation: glitch-anim 3s infinite linear alternate-reverse; }
    
    /* Lockdown & Omega Pulses */
    @keyframes lockdown-pulse {
      0% { box-shadow: inset 0 0 0px rgba(255,0,0,0); }
      50% { box-shadow: inset 0 0 150px rgba(255,0,0,0.4); }
      100% { box-shadow: inset 0 0 0px rgba(255,0,0,0); }
    }
    .lockdown-mode { animation: lockdown-pulse 2s infinite; }
    
    @keyframes omega-pulse {
      0% { box-shadow: inset 0 0 0px rgba(255,165,0,0); }
      50% { box-shadow: inset 0 0 100px rgba(255,165,0,0.15); }
      100% { box-shadow: inset 0 0 0px rgba(255,165,0,0); }
    }
    .omega-mode { animation: omega-pulse 4s infinite; }

    /* Typewriter cursor */
    .cursor-blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
    ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #0891b2; }
    .scrollbar-red::-webkit-scrollbar-thumb { background: #ef4444; }

                    </div>
                    {clearanceLevel >= 5 && (
                      <form onSubmit={(e) => { e.preventDefault(); const t = e.target; addDoc(getColRef('vsi_incidents'), { date: t.d.value, id: t.i.value, log: t.l.value, clearance: parseInt(t.c.value), class: t.cl.value }); t.reset(); }} className="mt-8 p-4 border border-zinc-800 bg-black/50 shrink-0">
                         <div className="flex gap-2 text-sm"><input name="d" placeholder="Date (YYYY-MM-DD)" required className="w-32 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><input name="i" placeholder="ID (INC-001)" required className="w-24 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><select name="cl" className="bg-zinc-900 border border-zinc-800 p-2 text-zinc-300"><option>Safe</option><option>Euclid</option><option>Keter</option></select><input type="number" name="c" placeholder="Lvl" defaultValue="3" className="w-16 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><input name="l" placeholder="Incident Log..." className="flex-1 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><button type="submit" className="bg-yellow-900/30 text-yellow-500 border border-yellow-700 px-3"><Plus size={16}/></button></div>
                      </form>
                    )}
                  </div>
                )}

                {/* TAB: EXPERIMENTS */}
                {activeTab === 'experiments' && !lockdownState && (
                  <div className="animate-in fade-in duration-500 h-full flex flex-col">
                    <h2 className="text-xl border-b border-zinc-800 pb-2 mb-6 text-yellow-500 shrink-0">RESEARCH & EXPERIMENT LOGS</h2>
                    <div className="flex-1 overflow-y-auto grid gap-6 pr-2">
                      {experiments.map((exp, i) => (
                        <div key={exp.id || i} className="border border-zinc-700 bg-black/50 p-5 rounded-md relative overflow-hidden group">
                          <div className="absolute -right-4 -top-4 opacity-5"><Flask size={100} /></div>
                          <div className="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                            <h3 className="font-bold text-yellow-500 flex items-center gap-2"><Flask size={16}/> {exp.id}</h3>
                            <span className="text-xs text-zinc-500 uppercase tracking-widest">{exp.protocol}</span>
                          </div>
                          <div className="space-y-3 text-sm z-10 relative">
                            <div><span className="text-zinc-500 font-bold">PROCEDURE:</span> <span className="text-zinc-300">{exp.procedure}</span></div>
                            <div><span className="text-zinc-500 font-bold">RESULT:</span> <span className="text-zinc-300">{clearanceLevel >= (exp.clearance||1) ? exp.result : <span className="bg-zinc-800 text-zinc-800 select-none">██████████████</span>}</span></div>
                            <div className="bg-yellow-950/20 border-l-2 border-yellow-500/50 p-2 mt-2">
                              <span className="text-yellow-600 font-bold text-xs uppercase block mb-1">Researcher Notes:</span>
                              <span className="text-yellow-200/70 italic">{clearanceLevel >= (exp.clearance||1) ? exp.notes : <span className="bg-zinc-800 text-zinc-800 select-none">██████████</span>}</span>
                            </div>
                          </div>
                          {clearanceLevel >= 5 && <button onClick={() => handleDelete('vsi_experiments', exp.id)} className="absolute top-2 right-2 text-zinc-600 hover:text-red-500 z-20"><Trash2 size={16}/></button>}
                        </div>
                      ))}
                    </div>
                    {clearanceLevel >= 5 && (
                      <form onSubmit={(e) => { e.preventDefault(); const t = e.target; addDoc(getColRef('vsi_experiments'), { id: t.i.value, protocol: t.p.value, procedure: t.pr.value, result: t.r.value, notes: t.n.value, clearance: parseInt(t.c.value) }); t.reset(); }} className="mt-8 p-4 border border-zinc-800 bg-black/50 shrink-0 relative z-20">
                         <div className="flex gap-2 text-sm flex-wrap"><input name="i" placeholder="ID (EXP-01)" required className="w-24 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><input name="p" placeholder="Protocol Name" required className="flex-1 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><input type="number" name="c" placeholder="Lvl" defaultValue="4" className="w-16 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /></div>
                         <div className="flex gap-2 text-sm mt-2"><input name="pr" placeholder="Procedure..." required className="flex-1 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><input name="r" placeholder="Result..." required className="flex-1 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><input name="n" placeholder="Notes..." required className="flex-1 bg-zinc-900 border border-zinc-800 p-2 text-zinc-300" /><button type="submit" className="bg-yellow-900/30 text-yellow-500 border border-yellow-700 px-3"><Plus size={16}/></button></div>
                      </form>
                    )}
                  </div>
                )}

                {/* TAB: LOGS */}
                {activeTab === 'logs' && !lockdownState && (
                  <div className="animate-in fade-in duration-500 h-full flex flex-col">
                    <h2 className="text-xl border-b border-zinc-800 pb-2 mb-4 text-zinc-400">P.I.R ACTIVITY LOGS</h2>
                    <div className="flex-1 overflow-y-auto space-y-1 font-mono text-[11px] md:text-xs border border-zinc-900 p-2 bg-black/40">
                      {accessLogs.map((log, i) => (
                        <div key={i} className={`flex gap-3 p-1 border-b border-zinc-900/50 hover:bg-zinc-900/30 ${log.action.includes('DENIED') || log.action.includes('LOCKDOWN') ? 'text-red-400' : 'text-zinc-500'}`}>
                          <span className="text-zinc-600 w-20 shrink-0">[{log.time}]</span>
                          <span className={`w-28 shrink-0 ${log.user === userProfile?.vsiId ? 'text-cyan-600' : 'text-zinc-400'}`}>{log.user}</span>
                          <span className="flex-1">{log.action}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* TAB: TERMINAL */}
                {activeTab === 'terminal' && (
                  <div className="animate-in fade-in duration-500 flex flex-col h-full font-mono text-sm">
                    {lockdownState && <div className="text-red-500 mb-4 font-bold border border-red-500 p-2 bg-red-950/20 text-center animate-pulse">SYSTEM IN LOCKDOWN. AWAITING OVERRIDE.</div>}
                    <div className={`flex-1 overflow-y-auto mb-4 space-y-1 ${lockdownState ? 'text-red-400' : 'text-green-500'}`}>
                      {terminalHistory.map((line, i) => <div key={i} className={line.startsWith('>') ? 'text-zinc-400 mt-2' : ''}>{line}</div>)}
                      <div ref={terminalEndRef} />
                    </div>
                    <form onSubmit={handleTerminalSubmit} className={`flex gap-2 shrink-0 border-t pt-4 ${lockdownState ? 'border-red-900/50' : 'border-green-900/50'}`}>
                      <span className={`mt-1 ${lockdownState ? 'text-red-500' : 'text-green-500'}`}>&gt;</span>
                      <input type="text" value={terminalInput} onChange={(e) => setTerminalInput(e.target.value)} className={`flex-1 bg-transparent outline-none uppercase ${lockdownState ? 'text-red-500 placeholder-red-900' : 'text-green-500 placeholder-green-900'}`} placeholder={lockdownState ? "ENTER OVERRIDE COMMAND..." : "AWAITING COMMAND..."} autoFocus spellCheck="false" />
                      <span className={`w-2 h-4 cursor-blink mt-1 shrink-0 ${lockdownState ? 'bg-red-500' : 'bg-green-500'}`}></span>
                    </form>
                  </div>
                )}

              </main>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
