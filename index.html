  <style>
    body { margin: 0; background-color: #000; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow: hidden; }
    
    /* CRT & Scanline Effects */
    .crt::before {
      content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }
    @keyframes scan {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }
    .animate-scan { animation: scan 4s linear infinite; }
    
    /* Glitch Effect */
    @keyframes glitch-anim {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 2px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -2px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 2px); }
      100% { clip-path: inset(30% 0 50% 0); transform: translate(2px, -2px); }
    }
    .glitch { position: relative; }
    .glitch::before, .glitch::after {
      content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black;
    }
    .glitch::before { left: 2px; text-shadow: -1px 0 red; animation: glitch-anim 2s infinite linear alternate-reverse; }
    .glitch::after { left: -2px; text-shadow: -1px 0 blue; animation: glitch-anim 3s infinite linear alternate-reverse; }
    
    /* Lockdown Pulse */
    @keyframes lockdown-pulse {
      0% { box-shadow: inset 0 0 0px rgba(255,0,0,0); }
      50% { box-shadow: inset 0 0 150px rgba(255,0,0,0.4); }
      100% { box-shadow: inset 0 0 0px rgba(255,0,0,0); }
    }
    .lockdown-mode { animation: lockdown-pulse 2s infinite; }

    /* Typewriter cursor */
    .cursor-blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
    ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #0891b2; }
    .scrollbar-red::-webkit-scrollbar-thumb { background: #ef4444; }
  </style>
</head>
<body class="crt">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const { useState, useEffect, useRef, useCallback } = React;

    // --- ICONS ---
    const Icon = ({ children, className, size = 20 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>

    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;

    const KeyRound = (p) => <Icon {...p}><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5"/></Icon>;
    const TerminalSquare = (p) => <Icon {...p}><path d="m7 11 2-2-2-2"/><path d="M11 13h4"/><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></Icon>;
    const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></Icon>;
    const AlertTriangle = (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
    const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
    const Crosshair = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></Icon>;
    const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
    const Eye = (p) => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Flask = (p) => <Icon {...p}><path d="M9 3h6"/><path d="M10 9l-5 9a2 2 0 0 0 1.8 3h10.4a2 2 0 0 0 1.8-3l-5-9V3"/><path d="M14 9V3"/><line x1="6" y1="14" x2="18" y2="14"/></Icon>;
    const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;

    // --- FIREBASE CONFIG ---
    let firebaseConfig;
    let isPreviewEnv = false;

    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
      isPreviewEnv = true;
    } else {
      firebaseConfig = {
        apiKey: "AIzaSyAkn7HkaAwkms8jM02FPoWsErZuDkBDUas",
        authDomain: "vsi-archives.firebaseapp.com",
        projectId: "vsi-archives",
        storageBucket: "vsi-archives.firebasestorage.app",
        messagingSenderId: "768083135521",
        appId: "1:768083135521:web:81d62f73fe7871ca9da76"
      };
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'vsi-default-id';

    const getDocsRef = () => isPreviewEnv ? collection(db, 'artifacts', appId, 'public', 'data', 'vsi_documents') : collection(db, 'vsi_documents');
    const getDocRef = (docId) => isPreviewEnv ? doc(db, 'artifacts', appId, 'public', 'data', 'vsi_documents', docId) : doc(db, 'vsi_documents', docId);
    const getConfigRef = () => isPreviewEnv ? doc(db, 'artifacts', appId, 'public', 'data', 'vsi_config', 'master_settings') : doc(db, 'vsi_config', 'master_settings');

    // --- SCP / SCIENTIFIC LORE DATA ---
    const LORE_PERSONNEL = [
      { id: 1, codename: "GHOST", rank: "Operative", status: "Active", level: 3, notes: "Specializes in deep recon. Psychological profile: Stable." },
      { id: 2, codename: "VIPER", rank: "Commander", status: "Active", level: 5, notes: "Lead tactician. High stress tolerance." },
      { id: 3, codename: "NULL", rank: "Analyst", status: "MIA", level: 4, notes: "Last seen investigating coordinates [REDACTED]. Presumed compromised." }
    ];

    const LORE_FACTIONS = [
      { id: "VSI-001", name: "Valtrix Swift Initiative", relation: "Self", class: "Safe", threat: "Green", description: "Primary tactical directive. Global oversight." },
      { id: "SYN-042", name: "The Syndicate", relation: "Hostile", class: "Keter", threat: "Black", description: "Paramilitary group. Known to utilize anomalous tech." },
      { id: "ECH-009", name: "Echo Company", relation: "Neutral", class: "Euclid", threat: "Yellow", description: "Mercenary outfit. Loyalties shift based on contract." }
    ];

    const LORE_INCIDENTS = [
      { date: "2026-02-14", id: "INC-███", log: "Containment breach at Site 44 involving entity SYN-042. Target reacquired with minimal casualties.", clearance: 3, class: "Euclid" },
      { date: "2026-03-01", id: "INC-890", log: "Intercepted Syndicate transmission regarding SCP-890. Investigation ongoing.", clearance: 4, class: "Safe" },
      { date: "2026-04-09", id: "INC-001", log: "Joint operation with unknown elements. Data purged by Commander Viper.", clearance: 5, class: "Keter" }
    ];

    const LORE_EXPERIMENTS = [
      { id: "EXP-77A", protocol: "Containment Protocol Omega-3", procedure: "Expose subject to anomalous artifact [REDACTED] in lead-lined vault.", result: "Subject experienced sudden biological mutation. Immediate termination.", notes: "Hypothesis: Artifact rewrites DNA on contact. DO NOT TOUCH.", clearance: 4 },
      { id: "EXP-77B", protocol: "Observation Protocol Alpha", procedure: "Introduce Echo Company operative to containment cell of SYN-042.", result: "Operative formed spontaneous alliance with entity. Both escaped.", notes: "Researcher Note: Never trust mercenaries with Keter-class objects.", clearance: 5 }
    ];

    // --- MAIN APP ---
    function App() {
      // Core State
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [documents, setDocuments] = useState([]);
      const [systemPassword, setSystemPassword] = useState('acidlava13'); 
      
      // Immersion & Security State
      const [clearanceLevel, setClearanceLevel] = useState(1); // 1 = Guest, 5 = Admin
      const [integrity, setIntegrity] = useState(100);
      const [lockdownState, setLockdownState] = useState(false);
      const [failedAttempts, setFailedAttempts] = useState(0);
      const [sessionExpired, setSessionExpired] = useState(false);
      const [argUnlocked, setArgUnlocked] = useState(false); // Hidden ARG Files state
      
      // Logs & AI
      const [accessLogs, setAccessLogs] = useState([{ time: new Date().toLocaleTimeString(), action: "SYSTEM BOOT", user: "GUEST" }]);
      const [aiMessage, setAiMessage] = useState("Monitoring baseline behavior.");
      const [activeAlerts, setActiveAlerts] = useState(["SYSTEM BOOT SUCCESSFUL"]);
      const [unauthorizedPopup, setUnauthorizedPopup] = useState(false);
      
      // UI State
      const [activeTab, setActiveTab] = useState('dashboard');
      const [unlockInput, setUnlockInput] = useState('');
      const [decryptingFiles, setDecryptingFiles] = useState({}); // { docId: boolean }
      const [searchQuery, setSearchQuery] = useState(''); // Search & Filter State
      
      // Terminal State
      const [terminalHistory, setTerminalHistory] = useState([
        "VSI OS v3.1.5 (SCP-Branch) initialized.",
        "Type 'HELP' for commands."
      ]);
      const [terminalInput, setTerminalInput] = useState('');
      const terminalEndRef = useRef(null);
      
      // Activity tracking for session timeout
      const lastActivityTime = useRef(Date.now());

      // --- LOGGING HELPER ---
      const addLog = useCallback((actionMsg) => {
        setAccessLogs(prev => [{ time: new Date().toLocaleTimeString(), action: actionMsg, user: clearanceLevel >= 5 ? "ADMIN" : "GUEST" }, ...prev]);
      }, [clearanceLevel]);

      // --- INITIALIZATION ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (firebaseConfig.apiKey === "YOUR_API_KEY") {
              setAuthLoading(false); return;
            }
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) { console.error("Auth Error:", error); setAuthLoading(false); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => { setUser(currentUser); setAuthLoading(false); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubDocs = onSnapshot(getDocsRef(), (snapshot) => {
          const docsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          docsData.sort((a, b) => b.createdAt - a.createdAt);
          setDocuments(docsData);
        });
        const unsubConfig = onSnapshot(getConfigRef(), (docSnap) => {
          if (docSnap.exists()) setSystemPassword(docSnap.data().classifiedPassword);
          else setDoc(getConfigRef(), { classifiedPassword: 'acidlava13' });
        });
        return () => { unsubDocs(); unsubConfig(); };
      }, [user]);

      // --- IMMERSION & SECURITY TIMERS ---
      useEffect(() => {
        const handleActivity = () => { lastActivityTime.current = Date.now(); };
        window.addEventListener('mousemove', handleActivity);
        window.addEventListener('keydown', handleActivity);

        const systemInterval = setInterval(() => {
          if (clearanceLevel === 5 && Date.now() - lastActivityTime.current > 120000) {
            setClearanceLevel(1);
            setSessionExpired(true);
            addLog("SESSION EXPIRED DUE TO INACTIVITY");
            setAiMessage("User inactive. Revoking privileges.");
          }

          if (!lockdownState && Math.random() > 0.85) {
            setIntegrity(prev => {
              const next = Math.max(0, prev - Math.floor(Math.random() * 5));
              if (next < 50 && prev >= 50) setAiMessage("Warning: Core network stability dropping.");
              return next;
            });
          }

          if (!lockdownState && Math.random() > 0.9) {
            const possibleAlerts = ["🚨 SUB-ROUTINE FAILURE", "📡 Encrypted ping intercepted", "⚠️ Anomaly spike detected in Sector 4"];
            setActiveAlerts(prev => [possibleAlerts[Math.floor(Math.random() * possibleAlerts.length)], ...prev].slice(0, 3));
          }
        }, 10000);

        return () => {
          clearInterval(systemInterval);
          window.removeEventListener('mousemove', handleActivity);
          window.removeEventListener('keydown', handleActivity);
        };
      }, [clearanceLevel, lockdownState, addLog]);

      useEffect(() => {
        if (terminalEndRef.current) terminalEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [terminalHistory]);


      // --- HANDLERS ---
      const triggerUnauthorized = useCallback((reason) => {
        setUnauthorizedPopup(true);
        setActiveAlerts(prev => ["🚨 UNAUTHORIZED ACCESS ATTEMPT LOGGED", ...prev]);
        addLog(`DENIED: ${reason}`);
        setAiMessage("Behavior deviates from baseline. Logging intrusion attempt.");
        setTimeout(() => setUnauthorizedPopup(false), 2000);
      }, [addLog]);

      const triggerLockdown = useCallback((reason = "CRITICAL THREAT") => {
        setLockdownState(true);
        setClearanceLevel(1);
        setIntegrity(0);
        addLog(`SYSTEM LOCKDOWN INITIATED: ${reason}`);
        setActiveAlerts([`🚨 ${reason}: LOCKDOWN ACTIVE`]);
        setAiMessage("Lockdown engaged. Awaiting administrator override.");
        setActiveTab('terminal');
      }, [addLog]);

      const handleTerminalSubmit = (e) => {
        e.preventDefault();
        const cmd = terminalInput.trim().toUpperCase();
        if (!cmd) return;
        
        let response = "";
        addLog(`Terminal Command: ${cmd}`);

        if (lockdownState) {
          if (cmd === 'OVERRIDE') {
            setLockdownState(false);
            setIntegrity(100);
            response = "LOCKDOWN LIFTED. Integrity restored.";
            addLog("LOCKDOWN OVERRIDDEN BY USER");
            setAiMessage("Lockdown lifted. Resuming standard protocols.");
          } else {
            response = "SYSTEM LOCKED. Type 'OVERRIDE' to lift protocol.";
          }
        } else {
          if (cmd === 'HELP') response = "CMDs: HELP, CLEAR, STATUS, OVERRIDE, REPAIR, BREACH, PROJECT OMEGA";
          else if (cmd === 'CLEAR') { setTerminalHistory([]); setTerminalInput(''); return; }
          else if (cmd === 'STATUS') response = `Integrity: ${integrity}% | Clearance: LEVEL ${clearanceLevel}`;
          else if (cmd === 'REPAIR') {
             setIntegrity(100); response = "Executing repair sequence... Data Integrity restored to 100%.";
             setAiMessage("System repaired manually.");
          }
          else if (cmd === 'BREACH') {
            triggerLockdown("SIMULATED BREACH");
            response = "Initiating simulated breach protocol...";
          }
          else if (cmd === 'PROJECT OMEGA') {
             setArgUnlocked(true);
             response = "ACCESS GRANTED. HIDDEN DIRECTORY UNLOCKED.";
             addLog("USER DISCOVERED PROJECT OMEGA");
             setAiMessage("Warning: Accessing undocumented black-site archives.");
          }
          else if (cmd.startsWith('ACCESS')) {
            response = clearanceLevel >= 5 ? "File data corrupted. Unrecoverable." : "ACCESS DENIED. Requires Level 5.";
          }
          else { response = `Command not recognized: ${cmd}`; }
        }

        setTerminalHistory(prev => [...prev, `> ${cmd}`, response]);
        setTerminalInput('');
      };

      const handleAuthModal = (e) => {
        e.preventDefault();
        addLog("Attempting clearance override");
        if (unlockInput.trim().toLowerCase() === systemPassword.trim().toLowerCase()) {
          setClearanceLevel(5);
          setUnlockInput('');
          setFailedAttempts(0);
          setAiMessage("Commander identified. Welcome back.");
          addLog("CLEARANCE ELEVATED TO LEVEL 5");
        } else {
          setUnlockInput('');
          setIntegrity(prev => prev - 10);
          const newFails = failedAttempts + 1;
          setFailedAttempts(newFails);
          triggerUnauthorized(`Invalid clearance code. (${newFails}/3 attempts)`);
          
          if (newFails >= 3) {
            triggerLockdown("MAX FAILURES REACHED");
            setFailedAttempts(0);
          }
        }
      };

      const startDecryption = (docId) => {
        if (clearanceLevel < 5) return triggerUnauthorized("Decryption requires Level 5");
        addLog(`Initiated decryption algorithm on file ID ${docId.substring(0,6)}`);
        setAiMessage("Decrypting classified asset. Please wait.");
        setDecryptingFiles(prev => ({ ...prev, [docId]: 'decrypting' }));
        
        setTimeout(() => {
          setDecryptingFiles(prev => ({ ...prev, [docId]: 'done' }));
          setAiMessage("Decryption complete. Asset ready for viewing.");
          addLog(`Decryption successful for file ID ${docId.substring(0,6)}`);
        }, 2500); 
      };

      const handleTabSwitch = (tabId) => {
        if (lockdownState && tabId !== 'terminal') return;
        setActiveTab(tabId);
        addLog(`Accessed Network Node: ${tabId.toUpperCase()}`);
      };

      const handleHoneypotTrigger = () => {
        if (clearanceLevel < 5) {
           triggerLockdown("HONEYPOT TRAP TRIGGERED");
        }
      };


      // --- COMPONENTS ---
      const Redacted = ({ text, reqLvl }) => {
        if (clearanceLevel >= reqLvl) return <span className="text-cyan-300 font-bold">{text}</span>;
        return <span onClick={() => triggerUnauthorized("Insufficient clearance for redacted text")} className="bg-zinc-800 text-zinc-800 cursor-not-allowed select-none px-1">{"█".repeat(text.length)}</span>;
      };

      const IntegrityMeter = () => {
        const color = integrity > 75 ? 'bg-cyan-500' : integrity > 30 ? 'bg-yellow-500' : 'bg-red-600 animate-pulse';
        return (
          <div className="flex items-center gap-2 text-xs">
            <span className="text-zinc-500 hidden md:inline">INTEGRITY:</span>
            <div className="w-24 h-2 bg-zinc-900 border border-zinc-700 rounded-sm overflow-hidden">
              <div className={`h-full ${color} transition-all duration-500`} style={{ width: `${integrity}%` }} />
            </div>
            <span className={integrity < 50 ? 'text-red-500 font-bold' : 'text-zinc-400'}>{integrity}%</span>
          </div>
        );
      };

      const ThreatBadge = ({ level }) => {
        const colors = {
          "Green": "border-green-500 text-green-400 bg-green-900/20",
          "Yellow": "border-yellow-500 text-yellow-400 bg-yellow-900/20",
          "Red": "border-red-500 text-red-400 bg-red-900/20",
          "Black": "border-zinc-500 text-zinc-400 bg-zinc-900 shadow-[0_0_10px_rgba(255,255,255,0.1)]",
        };
        return <span className={`text-[10px] px-2 py-0.5 border rounded-sm font-bold uppercase ${colors[level] || colors["Green"]}`}>{level} THREAT</span>;
      };

      const ClassBadge = ({ cls }) => {
        const colors = {
          "Safe": "text-green-500", "Euclid": "text-yellow-500", "Keter": "text-red-500 font-bold animate-pulse"
        };
        return <span className={`text-[10px] tracking-widest uppercase ${colors[cls] || "text-zinc-500"}`}>CLASS: {cls}</span>;
      };


      // --- DATA FILTERING ---
      const filteredDocuments = documents.filter(doc => 
        doc.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
        doc.type.toLowerCase().includes(searchQuery.toLowerCase()) ||
        doc.id.toLowerCase().includes(searchQuery.toLowerCase())
      );


      // --- RENDERERS ---
      if (authLoading) return (
        <div className="h-screen w-screen bg-[#050505] flex flex-col items-center justify-center text-cyan-400 font-mono">
          <TerminalSquare className="animate-pulse mb-4" size={48} />
          <h1 className="text-2xl font-bold tracking-[0.3em]">VSI OS INITIALIZING</h1>
          <p className="text-zinc-600 mt-2 text-sm">ESTABLISHING SECURE HANDSHAKE...</p>
        </div>
      );

      const isGlitching = (integrity < 30 || lockdownState) ? 'glitch' : '';

      return (
        <div className={`h-screen w-screen flex flex-col overflow-hidden text-zinc-300 bg-black font-mono select-none ${lockdownState ? 'lockdown-mode' : ''}`}>

                        spellCheck="false"
                      />
                      <span className={`w-2 h-4 cursor-blink mt-1 shrink-0 ${lockdownState ? 'bg-red-500' : 'bg-green-500'}`}></span>
                    </form>
                  </div>
                )}

              </main>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
